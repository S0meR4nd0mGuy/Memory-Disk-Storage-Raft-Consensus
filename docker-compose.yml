version: '3.8'

services:
  node1:
    build: .
    container_name: kvstore_node1
    environment:
      NODE_ID: node1
      LISTEN_ADDR: 0.0.0.0
      LISTEN_PORT: 5001
      API_PORT: 8001
      LOG_LEVEL: INFO
    ports:
      - "5001:5001"
      - "8001:8001"
    networks:
      - kvstore_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

